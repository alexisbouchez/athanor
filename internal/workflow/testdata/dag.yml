name: DAG Test
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Lint
        run: echo "linting"
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Test
        run: echo "testing"
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Build
        run: echo "building"
  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - name: Deploy
        run: echo "deploying"

name: CI
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Debug workspace
        run: |
          echo "pwd: $(pwd)"
          echo "ls workspace:"
          ls -la /workspace/ 2>&1 | head -10
          echo "mount info:"
          mount | grep workspace || echo "no workspace mount"
          echo "go.mod:"
          cat /workspace/go.mod 2>&1 | head -5 || echo "no go.mod"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
